<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评论管理 | 管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Inter",sans-serif;background:#0a0a0f;color:#f0f0f5;line-height:1.6;}
.admin-nav{background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
.admin-nav .logo{font-weight:700;background:linear-gradient(135deg,#6c5ce7,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.admin-nav a{color:#8888a0;text-decoration:none;font-size:0.9rem;margin-left:20px;}
.admin-nav a:hover{color:#f0f0f5;}
.container{max-width:1200px;margin:0 auto;padding:32px 24px;}
h2{margin-bottom:24px;}
table{width:100%;border-collapse:collapse;margin-bottom:32px;}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.9rem;}
th{color:#8888a0;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;}
td{color:#d0d0e0;}
.badge{font-size:0.75rem;padding:2px 8px;border-radius:100px;background:rgba(108,92,231,0.2);border:1px solid rgba(108,92,231,0.3);color:#a29bfe;display:inline-block;}
.badge-pending{background:rgba(253,121,168,0.2);border-color:rgba(253,121,168,0.3);color:#fd79a8;}
.badge-approved{background:rgba(0,184,148,0.2);border-color:rgba(0,184,148,0.3);color:#00b894;}
.btn-sm{font-size:0.8rem;padding:6px 14px;border-radius:100px;cursor:pointer;border:none;font-family:inherit;font-weight:500;text-decoration:none;display:inline-block;}
.btn-approve{background:rgba(0,184,148,0.2);color:#00b894;margin-right:6px;text-decoration:none;}
.btn-approve:hover{background:rgba(0,184,148,0.3);}
.btn-danger{background:rgba(253,121,168,0.2);color:#fd79a8;text-decoration:none;}
.btn-danger:hover{background:rgba(253,121,168,0.3);}
.section-title{font-size:1.2rem;font-weight:600;margin-bottom:16px;margin-top:32px;}
.empty-state{text-align:center;padding:40px;color:#555570;}
.back-link{margin-bottom:20px;display:inline-block;color:#8888a0;text-decoration:none;font-size:0.9rem;}
.back-link:hover{color:#f0f0f5;}
.td-content{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.avatar-mini{width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;}
</style>
</head>
<body>
<div class="admin-nav">
<div class="logo">电饭煲 管理后台</div>
<div>
<a href="/"><i class="fas fa-home"></i> 网站</a>
<a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> 仪表盘</a>
<a href="/admin/blogs"><i class="fas fa-edit"></i> 博客</a>
<a href="/admin/projects"><i class="fas fa-cube"></i> 项目</a>
<a href="/admin/comments"><i class="fas fa-comment"></i> 评论</a>
<a href="/admin/settings"><i class="fas fa-cog"></i> 设置</a>
<a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> 退出</a>
</div>
</div>
<div class="container">
<a href="/admin/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> 返回仪表盘</a>
<h2><i class="fas fa-comment" style="color:#a29bfe;"></i> 评论管理</h2>

<div class="section-title">
<span class="badge badge-pending" th:text="${#lists.size(pendingComments)}">0</span> 待审核评论
</div>
<div th:if="${#lists.isEmpty(pendingComments)}" class="empty-state">
<i class="fas fa-check-circle" style="font-size:2rem;color:#00b894;margin-bottom:10px;display:block;"></i>
没有待审核的评论
</div>
<table th:if="${!#lists.isEmpty(pendingComments)}">
<tr><th>用户</th><th>内容</th><th>页面</th><th>日期</th><th>操作</th></tr>
<tr th:each="c : ${pendingComments}">
<td>
<img th:if="${c.avatar != null and c.avatar.length() > 0}" th:src="${c.avatar}" class="avatar-mini" />
<span th:text="${c.displayName != null and c.displayName.length() > 0 ? c.displayName : c.author}">User</span>
</td>
<td class="td-content" th:text="${c.content}">Content</td>
<td th:text="${c.postId == 0 ? '留言板' : '博客'}">Page</td>
<td th:text="${#temporals.format(c.createdAt, 'MM-dd HH:mm')}">Date</td>
<td>
<a th:href="@{/admin/comments/approve/{id}(id=${c.id})}" class="btn-sm btn-approve"><i class="fas fa-check"></i> 通过</a>
<a th:href="@{/admin/comments/delete/{id}(id=${c.id})}" class="btn-sm btn-danger"><i class="fas fa-trash"></i> 删除</a>
</td>
</tr>
</table>

<div class="section-title" style="margin-top:48px;">
<span class="badge" th:text="${#lists.size(allComments)}">0</span> 全部评论
</div>
<div th:if="${#lists.isEmpty(allComments)}" class="empty-state">暂无评论</div>
<table th:if="${!#lists.isEmpty(allComments)}">
<tr><th>用户</th><th>内容</th><th>页面</th><th>状态</th><th>日期</th><th>操作</th></tr>
<tr th:each="c : ${allComments}">
<td>
<img th:if="${c.avatar != null and c.avatar.length() > 0}" th:src="${c.avatar}" class="avatar-mini" />
<span th:text="${c.displayName != null and c.displayName.length() > 0 ? c.displayName : c.author}">User</span>
</td>
<td class="td-content" th:text="${c.content}">Content</td>
<td th:text="${c.postId == 0 ? '留言板' : '博客'}">Page</td>
<td>
<span th:if="${c.approved}" class="badge badge-approved">已通过</span>
<span th:if="${!c.approved}" class="badge badge-pending">待审核</span>
</td>
<td th:text="${#temporals.format(c.createdAt, 'MM-dd HH:mm')}">Date</td>
<td>
<a th:if="${!c.approved}" th:href="@{/admin/comments/approve/{id}(id=${c.id})}" class="btn-sm btn-approve"><i class="fas fa-check"></i></a>
<a th:href="@{/admin/comments/delete/{id}(id=${c.id})}" class="btn-sm btn-danger"><i class="fas fa-trash"></i></a>
</td>
</tr>
</table>
</div>
</body>
</html>
