<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{nav.guestbook} + ' | ' + #{nav.logo}">Guestbook | Personal Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="alternate icon" th:href="@{/favicon.svg}">
</head>
<body>
    <div class="background-effects"><div class="gradient-orb"></div><div class="gradient-orb"></div><div class="gradient-orb"></div></div>
    <div class="grid-overlay"></div>
    <nav><div class="nav-container"><a href="/" class="nav-logo"><span th:text="#{nav.logo}">Portfolio</span> <span th:text="#{nav.logo.suffix}">// dev</span></a>
        <ul class="nav-links">
            <li><a href="/" th:classappend="${activeNav == 'home'} ? 'active'" th:text="#{nav.home}">Home</a></li>
            <li><a href="/about" th:classappend="${activeNav == 'about'} ? 'active'" th:text="#{nav.about}">About</a></li>
            <li><a href="/projects" th:classappend="${activeNav == 'projects'} ? 'active'" th:text="#{nav.projects}">Projects</a></li>
            <li><a href="/blog" th:classappend="${activeNav == 'blog'} ? 'active'" th:text="#{nav.blog}">Blog</a></li>
            <li><a href="/contact" th:classappend="${activeNav == 'contact'} ? 'active'" th:text="#{nav.contact}">Contact</a></li>
            <li style="position:relative;">
                <a href="#" id="moreToggle" class="more-link" onclick="event.preventDefault();document.getElementById('moreDropdown').classList.toggle('show');" th:text="#{nav.more}">More <i class="fas fa-chevron-down" style="font-size:0.7rem;margin-left:4px;"></i></a>
                <div id="moreDropdown" style="display:none;position:absolute;top:100%;right:0;background:var(--bg-secondary);border:1px solid var(--glass-border);border-radius:12px;padding:8px;min-width:160px;box-shadow:var(--shadow-lg);z-index:100;" onmouseleave="this.classList.remove('show')">
                    <a href="/timeline" style="display:block;padding:8px 16px;border-radius:8px;color:var(--text-secondary);font-size:0.85rem;white-space:nowrap;"><i class="fas fa-stream" style="width:18px;color:var(--accent-2);"></i><span th:text="#{nav.timeline}">Timeline</span></a>
                    <a href="/resume" style="display:block;padding:8px 16px;border-radius:8px;color:var(--text-secondary);font-size:0.85rem;white-space:nowrap;"><i class="fas fa-file-alt" style="width:18px;color:var(--accent-2);"></i><span th:text="#{nav.resume}">Resume</span></a>
                    <a href="/friends" style="display:block;padding:8px 16px;border-radius:8px;color:var(--text-secondary);font-size:0.85rem;white-space:nowrap;"><i class="fas fa-link" style="width:18px;color:var(--accent-2);"></i><span th:text="#{nav.friends}">Friends</span></a>
                    <a href="/comments/guestbook" style="display:block;padding:8px 16px;border-radius:8px;color:var(--text-secondary);font-size:0.85rem;white-space:nowrap;"><i class="fas fa-comment-dots" style="width:18px;color:var(--accent-2);"></i><span th:text="#{nav.guestbook}">Guestbook</span></a>
                </div>
            </li>
            <li th:if="${session.user == null}"><a href="/login" style="color:var(--text-secondary);font-size:0.85rem;"><i class="fas fa-sign-in-alt"></i> <span th:text="#{user.login.title}">Sign In</span></a></li>
            <li th:if="${session.user != null}"><a href="/profile" style="color:var(--accent-2);font-size:0.85rem;font-weight:500;"><i class="fas fa-user"></i> <span th:text="${session.user.username}">User</span></a></li>
            <li th:if="${session.user != null}"><a href="/logout" style="color:var(--text-muted);font-size:0.85rem;" title="Logout"><i class="fas fa-sign-out-alt"></i></a></li>
            <li><button class="theme-toggle" id="themeToggle" aria-label="Theme"><i class="fas fa-moon"></i></button></li>
            <li><a th:if="${#locale.language == 'zh'}" href="?lang=en" class="lang-switch"><span th:text="#{nav.switch.lang}">EN</span></a><a th:if="${#locale.language != 'zh'}" href="?lang=zh_CN" class="lang-switch"><span th:text="#{nav.switch.lang}">ZH</span></a></li>
        </ul>
        <button class="menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button></div></nav>

    <section style="padding-top:160px;">
        <div class="section-header fade-in visible">
            <span class="section-tag" th:text="#{nav.guestbook}">Guestbook</span>
            <h2 class="section-title" th:text="#{guestbook.title}">Guestbook</h2>
            <p class="section-subtitle" th:text="#{guestbook.subtitle}">Leave a message!</p>
        </div>
        <div style="max-width:700px;margin:0 auto;">
            <form id="comment-form" class="contact-form" style="margin-bottom:48px;">
                <input type="hidden" id="commentPostId" value="0">
                <div class="form-group"><label for="commentAuthor" th:text="#{guestbook.name}">Name *</label><input type="text" id="commentAuthor" th:placeholder="#{guestbook.namePlaceholder}" required></div>
                <div class="form-group"><label for="commentEmail" th:text="#{guestbook.email}">Email</label><input type="email" id="commentEmail" th:placeholder="#{guestbook.emailPlaceholder}"></div>
                <div class="form-group"><label for="commentContent" th:text="#{guestbook.message}">Message *</label><textarea id="commentContent" th:placeholder="#{guestbook.messagePlaceholder}" required></textarea></div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;"><i class="fas fa-paper-plane"></i> <span th:text="#{guestbook.submit}">Submit</span></button>
            </form>

            <h3 style="margin-bottom:24px;" th:text="#{guestbook.messages}">Messages</h3>
            <div th:if="${#lists.isEmpty(comments)}" style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-comment-dots" style="font-size:3rem;display:block;margin-bottom:16px;opacity:0.3;"></i> <span th:text="#{guestbook.empty}">No messages yet.</span></div>
            <div th:each="c : ${comments}" class="fade-in" style="padding:20px;border-radius:var(--radius-sm);background:var(--glass-bg);border:1px solid var(--glass-border);margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <strong th:text="${c.author}">Author</strong>
                    <span style="font-size:0.8rem;color:var(--text-muted);" th:text="${#temporals.format(c.createdAt, 'MMM dd, yyyy')}">Date</span>
                </div>
                <p style="color:var(--text-secondary);font-size:0.95rem;line-height:1.7;" th:text="${c.content}">Content</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-container">
            <div class="footer-links" style="display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap;">
                <a href="/" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;" th:text="#{footer.home}">Home</a>
                <a href="/about" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;" th:text="#{footer.about}">About</a>
                <a href="/projects" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;" th:text="#{footer.projects}">Projects</a>
                <a href="/blog" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;" th:text="#{footer.blog}">Blog</a>
                <a href="/contact" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none;" th:text="#{footer.contact}">Contact</a>
            </div>
            <div class="footer-social">
                <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-top:12px;" th:utext="#{footer.copyright}">&copy; 2026 Rice Cooker.</p>
        </div>
    </footer>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
