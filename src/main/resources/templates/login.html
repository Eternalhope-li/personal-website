<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{user.login.title} + ' | ' + #{nav.logo}">Login | Personal Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="alternate icon" th:href="@{/favicon.svg}">
</head>
<body style="background:var(--bg-primary);display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="background-effects"><div class="gradient-orb"></div><div class="gradient-orb"></div><div class="gradient-orb"></div></div>
    <div class="grid-overlay"></div>
    <div style="width:400px;max-width:90%;padding:40px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);">
        <div style="text-align:center;margin-bottom:32px;">
            <div style="font-size:2rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;" th:text="#{user.login.title}">Login</div>
            <p style="color:var(--text-muted);font-size:0.9rem;" th:text="#{user.login.subtitle}">Sign in to your account</p>
        </div>

        <div th:if="${param.registered != null}" style="padding:12px 16px;border-radius:8px;margin-bottom:16px;background:rgba(0,184,148,0.1);border:1px solid rgba(0,184,148,0.3);color:#00b894;font-size:0.85rem;text-align:center;">
            <i class="fas fa-check-circle"></i> <span th:text="#{user.login.registered}">Registration successful! Please sign in.</span>
        </div>

        <form method="post" th:action="@{/login}">
            <div class="form-group"><label th:text="#{user.login.username}">Username</label><input type="text" name="username" th:placeholder="#{user.login.usernamePlaceholder}" required></div>
            <div class="form-group"><label th:text="#{user.login.password}">Password</label><input type="password" name="password" th:placeholder="#{user.login.passwordPlaceholder}" required></div>
            <div th:if="${error}" style="color:var(--accent-3);font-size:0.85rem;margin-bottom:16px;text-align:center;" th:text="${error}">Error</div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" th:text="#{user.login.submit}">Sign In</button>
        </form>
        <div style="text-align:center;margin-top:16px;">
            <a href="/register" style="font-size:0.85rem;color:var(--accent-2);" th:text="#{user.login.noAccount}">No account? Register</a>
            <span style="color:var(--text-muted);margin:0 8px;">|</span>
            <a href="/" style="font-size:0.85rem;color:var(--text-muted);" th:text="#{user.login.back}">Back to Home</a>
        </div>
    </div>
</body>
</html>
