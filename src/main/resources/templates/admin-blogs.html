<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客管理 | 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:"Inter",sans-serif;background:#0a0a0f;color:#f0f0f5;line-height:1.6;}
        .admin-nav{background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
        .admin-nav .logo{font-weight:700;background:linear-gradient(135deg,#6c5ce7,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .admin-nav a{color:#8888a0;text-decoration:none;font-size:0.9rem;margin-left:20px;}
        .admin-nav a:hover{color:#f0f0f5;}
        .container{max-width:1200px;margin:0 auto;padding:32px 24px;}
        .card{padding:24px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);margin-bottom:32px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:0.85rem;color:#8888a0;margin-bottom:6px;}
        .form-group input,.form-group textarea{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#f0f0f5;font-size:0.9rem;font-family:inherit;}
        #editor{height:300px;}
        table{width:100%;border-collapse:collapse;margin-bottom:32px;}
        th,td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.9rem;}
        th{color:#8888a0;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;}
        td{color:#d0d0e0;}
        .btn{padding:8px 16px;border-radius:100px;cursor:pointer;border:none;font-family:inherit;font-weight:500;font-size:0.85rem;text-decoration:none;display:inline-block;}
        .btn-primary{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;}
        .btn-primary:hover{opacity:0.9;}
        .btn-success{background:rgba(0,184,148,0.2);color:#00b894;}
        .btn-success:hover{background:rgba(0,184,148,0.3);}
        .btn-danger{background:rgba(253,121,168,0.2);color:#fd79a8;}
        .btn-sm{padding:6px 14px;font-size:0.8rem;}
        .td-title{max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .cancel-edit{display:none;margin-left:8px;}
    </style>
</head>
<body>
    <div class="admin-nav">
        <div class="logo">电饭煲 管理后台</div>
        <div>
            <a href="/"><i class="fas fa-home"></i> 查看网站</a>
            <a href="/admin/blogs"><i class="fas fa-edit"></i> 博客</a>
            <a href="/admin/projects"><i class="fas fa-cube"></i> 项目</a>
            <a href="/admin/comments"><i class="fas fa-comment"></i> 评论</a>
            <a href="/admin/settings"><i class="fas fa-cog"></i> 设置</a>
            <a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> 退出</a>
        </div>
    </div>
    <div class="container">
        <h2 style="margin-bottom:24px;"><i class="fas fa-edit" style="color:#a29bfe;"></i> 博客管理</h2>
        <div class="card">
            <h3 style="margin-bottom:16px;" th:text="${post != null} ? '编辑博客' : '新增博客'">新增/编辑博客</h3>
            <form method="post" th:action="@{/admin/blogs/save}">
                <input type="hidden" name="id" th:value="${post != null ? post.id : ''}" />
                <div class="form-group"><label>标题</label><input type="text" name="title" th:value="${post != null ? post.title : ''}" required /></div>
                <div class="form-group"><label>摘要</label><input type="text" name="summary" th:value="${post != null ? post.summary : ''}" /></div>
                <div class="form-group"><label>分类</label><input type="text" name="category" th:value="${post != null ? post.category : ''}" placeholder="tech/life/design" /></div>
                <div class="form-group"><label>封面图片URL（可选）</label><input type="text" name="coverImage" th:value="${post != null ? post.coverImage : ''}" placeholder="https://..." /></div>
                <div class="form-group"><label>内容</label><input type="hidden" name="content" id="content" /><textarea id="content-fallback" style="display:none;" th:text="${post != null ? #strings.escapeXml(post.content) : ''}"></textarea><div id="editor"></div></div>
                <button type="submit" class="btn btn-primary" th:text="${post != null} ? '更新博客' : '保存博客'">保存博客</button>
                <a th:if="${post != null}" href="/admin/blogs" class="btn btn-sm btn-success cancel-edit" style="display:inline-block;"><i class="fas fa-times"></i> 取消编辑</a>
            </form>
        </div>
        <table>
            <tr><th>标题</th><th>分类</th><th>日期</th><th>操作</th></tr>
            <tr th:each="p : ${posts}">
                <td class="td-title" th:text="${p.title}">Title</td>
                <td><span class="badge" th:text="${p.category}">category</span></td>
                <td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd')}">Date</td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/admin/blogs/edit/{id}(id=${p.id})}" class="btn btn-sm btn-success"><i class="fas fa-pen"></i> 编辑</a>
                    <a th:href="@{/admin/blogs/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确认删除这篇博客？')"><i class="fas fa-trash"></i> 删除</a>
                </td>
            </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        var quill = new Quill("#editor", {theme:"snow", placeholder:"在此输入内容..."});
        // If editing, populate content using textarea fallback
        var existingContent = document.getElementById("content-fallback");
        if (existingContent && existingContent.innerHTML && existingContent.innerHTML.trim().length > 0) {
            quill.root.innerHTML = existingContent.innerHTML;
        }
        document.querySelector("form").onsubmit = function() {
            document.getElementById("content").value = quill.root.innerHTML;
        };
    </script>
</body>
</html>
