<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 | 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body style="background:var(--bg-primary);display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="background-effects"><div class="gradient-orb"></div><div class="gradient-orb"></div><div class="gradient-orb"></div></div>
    <div class="grid-overlay"></div>
    <div style="width:400px;max-width:90%;padding:40px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);position:relative;">
        <div style="text-align:center;margin-bottom:32px;">
            <div style="font-size:2rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;">管理员登录</div>
            <p style="color:var(--text-muted);font-size:0.9rem;">登录以管理你的网站</p>
        </div>
        <form method="post" th:action="@{/admin/login}">
            <div class="form-group"><label>账号</label><input type="text" name="username"  required></div>
            <div class="form-group"><label>密码</label><input type="password" name="password"  required></div>
            <div th:if="${error}" style="color:var(--accent-3);font-size:0.85rem;margin-bottom:16px;text-align:center;" th:text="${error}">Error</div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">登录</button>
        </form>
        <div style="text-align:center;margin-top:16px;"><a href="/" style="font-size:0.85rem;color:var(--text-muted);">← 返回首页</a></div>
    </div>
</body>
</html>
