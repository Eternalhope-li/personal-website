<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 | 电饭煲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:"Inter",sans-serif;background:#0a0a0f;color:#f0f0f5;line-height:1.6;}
        .admin-nav{background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
        .admin-nav .logo{font-weight:700;background:linear-gradient(135deg,#6c5ce7,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .admin-nav a{color:#8888a0;text-decoration:none;font-size:0.9rem;margin-left:20px;}
        .admin-nav a:hover{color:#f0f0f5;}
        .container{max-width:1200px;margin:0 auto;padding:32px 24px;}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px;}
        .stat-card{padding:24px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);}
        .stat-card .num{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .stat-card .lbl{font-size:0.85rem;color:#8888a0;margin-top:4px;}
        table{width:100%;border-collapse:collapse;margin-bottom:32px;}
        th,td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.9rem;}
        th{color:#8888a0;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;}
        td{color:#d0d0e0;}
        .badge{font-size:0.75rem;padding:2px 8px;border-radius:100px;background:rgba(108,92,231,0.2);border:1px solid rgba(108,92,231,0.3);color:#a29bfe;display:inline-block;}
        .badge-pending{background:rgba(253,121,168,0.2);border-color:rgba(253,121,168,0.3);color:#fd79a8;}
        .badge-approved{background:rgba(0,184,148,0.2);border-color:rgba(0,184,148,0.3);color:#00b894;}
        .btn-sm{font-size:0.8rem;padding:6px 14px;border-radius:100px;cursor:pointer;border:none;font-family:inherit;font-weight:500;text-decoration:none;display:inline-block;}
        .btn-approve{background:rgba(0,184,148,0.2);color:#00b894;margin-right:6px;}
        .btn-approve:hover{background:rgba(0,184,148,0.3);}
        .btn-danger{background:rgba(253,121,168,0.2);color:#fd79a8;}
        .btn-danger:hover{background:rgba(253,121,168,0.3);}
        .section-title{font-size:1.2rem;font-weight:600;margin-bottom:16px;margin-top:32px;}
        .quick-links{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;}
        .quick-links a{padding:12px 24px;border-radius:100px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#d0d0e0;text-decoration:none;font-size:0.9rem;transition:all 0.3s;}
        .quick-links a:hover{border-color:#6c5ce7;background:rgba(108,92,231,0.1);color:#fff;}
    </style>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>
    <div class="admin-nav">
        <div class="logo">电饭煲 管理后台</div>
        <div>
            <a href="/"><i class="fas fa-home"></i> 查看网站</a>
            <a href="/admin/blogs"><i class="fas fa-edit"></i> 博客</a>
            <a href="/admin/projects"><i class="fas fa-cube"></i> 项目</a>
            <a href="/admin/comments"><i class="fas fa-comment"></i> 评论</a>
            <a href="/admin/settings"><i class="fas fa-cog"></i> 设置</a>
            <a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> 退出</a>
        </div>
    </div>

    <div class="container">
        <h2 style="margin-bottom:24px;">仪表盘</h2>

        <div class="stats">
            <div class="stat-card"><div class="num" th:text="${blogCount}">0</div><div class="lbl">博客文章</div></div>
            <div class="stat-card"><div class="num" th:text="${projectCount}">0</div><div class="lbl">项目总数</div></div>
            <div class="stat-card"><div class="num" th:text="${messageCount}">0</div><div class="lbl">联系留言</div></div>
            <div class="stat-card"><div class="num" th:text="${#lists.size(pendingComments)}">0</div><div class="lbl">待审评论</div></div>
        </div>

        <div class="quick-links">
            <a href="/admin/blogs"><i class="fas fa-edit"></i> <span>管理博客</span></a>
            <a href="/admin/projects"><i class="fas fa-cube"></i> <span>管理项目</span></a>
        </div>

        <div class="section-title"><i class="fas fa-comment" style="color:#a29bfe;"></i> <span>待审核评论</span></div>
        <div th:if="${#lists.isEmpty(pendingComments)}" style="padding:20px;text-align:center;color:#555570;">没有待审核的评论</div>
        <table th:if="${!#lists.isEmpty(pendingComments)}">
            <tr><th>用户</th><th>内容</th><th>日期</th><th>操作</th></tr>
            <tr th:each="c : ${pendingComments}">
                <td th:text="${c.author}">Author</td>
                <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" th:text="${c.content}">Content</td>
                <td th:text="${#temporals.format(c.createdAt, 'MM-dd HH:mm')}">Date</td>
                <td>
                    <a th:href="@{/admin/comments/approve/{id}(id=${c.id})}" class="btn-sm btn-approve"><i class="fas fa-check"></i> 通过</a>
                    <a th:href="@{/admin/comments/delete/{id}(id=${c.id})}" class="btn-sm btn-danger"><i class="fas fa-trash"></i> 删除</a>
                </td>
            </tr>
        </table>

        <div class="section-title"><i class="fas fa-envelope" style="color:#a29bfe;"></i> <span>最近留言</span></div>
        <div th:if="${#lists.isEmpty(messages)}" style="padding:20px;text-align:center;color:#555570;">暂无留言</div>
        <table th:if="${!#lists.isEmpty(messages)}">
            <tr><th>姓名</th><th>邮箱</th><th>主题</th><th>日期</th></tr>
            <tr th:each="m : ${messages}">
                <td th:text="${m.name}">Name</td>
                <td th:text="${m.email}">Email</td>
                <td th:text="${m.subject}">Subject</td>
                <td th:text="${#temporals.format(m.createdAt, 'MM-dd HH:mm')}">Date</td>
            </tr>
        </table>
    </div>
</body>
</html>
